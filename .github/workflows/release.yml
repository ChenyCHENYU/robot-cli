name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "要发布或修复的标签（例如 v3.1.4）"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Validate tag and package version
        shell: bash
        run: |
          package_version="$(jq -r '.version' package.json)"

          if [[ "$RELEASE_TAG" != "v$package_version" ]]; then
            echo "Tag $RELEASE_TAG does not match package version $package_version" >&2
            exit 1
          fi

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "GitHub Release $RELEASE_TAG already exists; nothing to do."
          else
            gh release create "$RELEASE_TAG" --verify-tag --generate-notes --title "$RELEASE_TAG"
